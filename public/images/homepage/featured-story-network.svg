<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 520" role="img" aria-labelledby="title desc">
  <title id="title">Reasoning model network visualization</title>
  <desc id="desc">Blue and orange neural network lines on a dark field.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop stop-color="#0E2B67"/>
      <stop offset=".45" stop-color="#071633"/>
      <stop offset="1" stop-color="#020713"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="768" height="520" fill="url(#bg)"/>
  <g opacity=".28" stroke="#FFFFFF" stroke-width="1">
    <path d="M0 374C142 272 255 280 340 398s224 103 428-46"/>
