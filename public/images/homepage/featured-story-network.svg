    <path d="M34 520C130 373 268 295 448 288c115-4 221-48 320-132"/>
  </g>
  <g filter="url(#glow)" stroke-linecap="round">
    <g stroke="#1457F5" stroke-width="3" opacity=".9">
      <path d="M82 404 196 318 312 362 438 242 586 278 704 160"/>
      <path d="M126 190 258 150 356 242 500 122 666 230"/>
      <path d="M60 292 210 258 312 362 462 386 618 330"/>
    </g>
    <g stroke="#FF4B23" stroke-width="2.5" opacity=".92">
      <path d="M116 112 248 238 386 202 524 324 704 286"/>
      <path d="M42 352 188 404 326 300 472 318 638 430"/>
