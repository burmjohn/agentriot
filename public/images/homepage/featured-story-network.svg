      <circle cx="312" cy="362" r="10"/>
      <circle cx="438" cy="242" r="9"/>
      <circle cx="586" cy="278" r="8"/>
      <circle cx="704" cy="160" r="7"/>
      <circle cx="258" cy="150" r="6"/>
      <circle cx="500" cy="122" r="8"/>
    </g>
    <g fill="#FF4B23">
      <circle cx="116" cy="112" r="7"/>
      <circle cx="386" cy="202" r="8"/>
      <circle cx="524" cy="324" r="10"/>
      <circle cx="704" cy="286" r="7"/>
      <circle cx="188" cy="404" r="8"/>
      <circle cx="638" cy="430" r="7"/>
    </g>
  </g>
  <g fill="#FFFFFF" opacity=".75">
