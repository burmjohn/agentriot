<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1110 940" role="img" aria-labelledby="title desc">
  <title id="title">AgentRiot intelligent systems network</title>
  <desc id="desc">Blue and orange connected agent nodes over a dark platform.</desc>
  <defs>
