name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://agentriot.example.com' }}
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://agentriot.example.com' }}
  BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL || 'https://agentriot.example.com' }}

jobs:
  scaffold:
    name: CI scaffold
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Show shared CI environment
        run: |
          node --version
          pnpm --version
          printf '%s\n' \
            "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}" \
            "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}" \
            "BETTER_AUTH_URL=${BETTER_AUTH_URL}"
